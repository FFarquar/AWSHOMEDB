AWSTemplateFormatVersion: 2010-09-09
Description: >-
  AWSHOMEDB

Transform:
- AWS::Serverless-2016-10-31

# Allows your GitHub Actions workflow to pass "Stage" or "Develop" dynamically
Parameters:
  StageName:
    Type: String
    Default: Stage
    Description: "The deployment stage name passed from your branch workflow"

Resources:
  # Centralized Explicit API Definition
  MyServerlessApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref StageName # Dynamically maps to your branch environment parameter
      
      # 🚀 FIXED: AllowOrigin updated to your specific ffarquar.github.io domain
      Cors:
        AllowMethods: "'POST,GET,OPTIONS,PUT,DELETE'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
        AllowOrigin: "'https://ffarquar.github.io'"
        MaxAge: "'600'"

      Auth:
        DefaultAuthorizer: LambdaTokenAuthorizer
        Authorizers:
          LambdaTokenAuthorizer:
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            FunctionPayloadType: TOKEN
            Identity:
              Headers:
                - Authorization
            AuthorizerResultTtlInSeconds: 0

  # Container item lambdas 
  ContainersListFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/containers/containers-list.handler
      Runtime: nodejs24.x
      Environment:
        Variables:
          TABLE_NAME: !Ref AWSHomeDBTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AWSHomeDBTable
      Events:
        GetContainers:
          Type: Api
          Properties:
            RestApiId: !Ref MyServerlessApi
            Path: /containers
            Method: GET

  ContainerGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/containers/containers-get.handler
      Runtime: nodejs24.x
      Environment:
        Variables:
          TABLE_NAME: !Ref AWSHomeDBTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AWSHomeDBTable
      Events:
        GetContainerById:
          Type: Api
          Properties:
            RestApiId: !Ref MyServerlessApi
            Path: /containers/{id}
            Method: GET

  ContainerCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/containers/containers-create.handler
      Runtime: nodejs24.x
      Environment:
        Variables:
          TABLE_NAME: !Ref AWSHomeDBTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AWSHomeDBTable
      Events:
        PostContainer:
          Type: Api
          Properties:
            RestApiId: !Ref MyServerlessApi
            Path: /containers
            Method: POST

  ContainerDeleteFunction:
      Type: AWS::Serverless::Function
      Properties:
        CodeUri: .
        Handler: src/handlers/containers/containers-delete.handler
        Runtime: nodejs24.x
        Environment:
          Variables:
            TABLE_NAME: !Ref AWSHomeDBTable
        Policies:
          # Grants permission to perform write/delete execution rules on this table
          - DynamoDBCrudPolicy:
              TableName: !Ref AWSHomeDBTable
        Events:
          DeleteContainerById:
            Type: Api
            Properties:
              RestApiId: !Ref MyServerlessApi
              Path: /containers/{id}
              Method: DELETE            

  ContainerUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/containers/containers-update.handler
      Runtime: nodejs24.x
      Environment:
        Variables:
          TABLE_NAME: !Ref AWSHomeDBTable
      Policies:
        # Grants write/update execution rule bounds on this table instance
        - DynamoDBCrudPolicy:
            TableName: !Ref AWSHomeDBTable
      Events:
        UpdateContainerById:
          Type: Api
          Properties:
            RestApiId: !Ref MyServerlessApi
            Path: /containers/{id}
            Method: PUT # You can use PUT or PATCH here

  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/login.handler
      Runtime: nodejs24.x
      Environment:
        Variables:
          TABLE_NAME: !Ref AWSHomeDBTable
          AUTH_SECRET: !Sub "${AWS::StackName}-auth-secret"
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AWSHomeDBTable
      Events:
        LoginUser:
          Type: Api
          Properties:
            RestApiId: !Ref MyServerlessApi
            Path: /login
            Method: POST
            Auth:
              Authorizer: NONE

  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/authorizer.handler
      Runtime: nodejs24.x
      Environment:
        Variables:
          AUTH_SECRET: !Sub "${AWS::StackName}-auth-secret"

  # DynamoDB table to store item: {id: <ID>, name: <NAME>}
  AWSHomeDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-Data"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: category
          AttributeType: S
        - AttributeName: purchasedFrom
          AttributeType: S
        - AttributeName: itemName
          AttributeType: S
        - AttributeName: warrantyExpiryDate
          AttributeType: S
        - AttributeName: entityType
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: CategoryIndex
          KeySchema:
            - AttributeName: category
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: PurchasedFromIndex
          KeySchema:
            - AttributeName: purchasedFrom
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: ItemNameIndex
          KeySchema:
            - AttributeName: itemName
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: WarrantyIndex
          KeySchema:
            - AttributeName: entityType
              KeyType: HASH
            - AttributeName: warrantyExpiryDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: AWSHomeDB

Outputs:
  WebEndpoint:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${MyServerlessApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${StageName}/"
