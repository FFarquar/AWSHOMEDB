# 🔐 FIXED GLOBALS: Enforces table name and secrets across every function automatically
Globals:
  Function:
    Environment:
      Variables:
        TABLE_NAME: !Ref AWSHomeDBTable
        AUTH_SECRET: !Sub "${AWS::StackName}-auth-secret"

Resources:

  # =========================
  # HTTP API
  # =========================
  MyServerlessApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref StageName
      Description: "AWSHomeDB HTTP API"
      CorsConfiguration:
        AllowOrigins:
          - https://github.io
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-Amz-Date
          - X-Amz-Security-Token
          - X-Api-Key
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        MaxAge: 600
      Auth:
        DefaultAuthorizer: LambdaTokenAuthorizer
        Authorizers:
          LambdaTokenAuthorizer:
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            AuthorizerPayloadFormatVersion: "1.0" 
            Identity:
              Headers:
                - Authorization

  # =========================
  # CONTAINERS
  # =========================

  ContainersListFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/containers/containers-list.handler
      Runtime: nodejs24.x
      # 🛠️ Environment block removed safely
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AWSHomeDBTable
      Events:
        GetContainers:
          Type: HttpApi
          Properties:
            ApiId: !Ref MyServerlessApi
            Path: /containers
            Method: GET

  ContainerGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/containers/containers-get.handler
      Runtime: nodejs24.x
      # 🛠️ Environment block removed safely
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AWSHomeDBTable
      Events:
        GetContainerById:
          Type: HttpApi
          Properties:
            ApiId: !Ref MyServerlessApi
            Path: /containers/{id}
            Method: GET

  ContainerCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/containers/containers-create.handler
      Runtime: nodejs24.x
      # 🛠️ Environment block removed safely
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AWSHomeDBTable
      Events:
        PostContainer:
          Type: HttpApi
          Properties:
            ApiId: !Ref MyServerlessApi
            Path: /containers
            Method: POST

  ContainerDeleteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/containers/containers-delete.handler
      Runtime: nodejs24.x
      # 🛠️ Environment block removed safely
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AWSHomeDBTable
      Events:
        DeleteContainerById:
          Type: HttpApi
          Properties:
            ApiId: !Ref MyServerlessApi
            Path: /containers/{id}
            Method: DELETE

  ContainerUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/containers/containers-update.handler
      Runtime: nodejs24.x
      # 🛠️ Environment block removed safely
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AWSHomeDBTable
      Events:
        UpdateContainerById:
          Type: HttpApi
          Properties:
            ApiId: !Ref MyServerlessApi
            Path: /containers/{id}
            Method: PUT

  # =========================
  # LOGIN (PUBLIC)
  # =========================

  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/login.handler
      Runtime: nodejs24.x
      # 🛠️ Environment block removed safely
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AWSHomeDBTable
      Events:
        LoginUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref MyServerlessApi
            Path: /login
            Method: POST
            Auth:
              Authorizer: NONE

  # =========================
  # AUTHORIZER
  # =========================

  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/authorizer.handler
      Runtime: nodejs24.x
      # 🛠️ Environment block removed safely
