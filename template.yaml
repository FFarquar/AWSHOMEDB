# This is the SAM template that represents the architecture of your serverless application
# https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/serverless-sam-template-basics.html

# The AWSTemplateFormatVersion identifies the capabilities of the template
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/format-version-structure.html
AWSTemplateFormatVersion: 2010-09-09
Description: >-
  AWSHOMEDB

# Transform section specifies one or more macros that AWS CloudFormation uses to process your template
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/transform-section-structure.html
Transform:
- AWS::Serverless-2016-10-31

Globals:
  Api:
    Auth:
      Authorizers:
        LambdaTokenAuthorizer:
          FunctionArn: !GetAtt AuthorizerFunction.Arn
          FunctionPayloadType: TOKEN
          Identity:
            Headers:
              - Authorization

# Resources declares the AWS resources that you want to include in the stack
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/resources-section-structure.html
Resources:
  # Each Lambda function is defined by properties:
  # https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction

  # Container item lambdas 
  ContainersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/containers.handler
      Runtime: nodejs24.x

      Environment:
        Variables:
          TABLE_NAME: !Ref AWSHomeDBTable

      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AWSHomeDBTable

      Events:
        GetContainers:
          Type: Api
          Properties:
            Path: /containers
            Method: GET
            Auth:
              Authorizer: LambdaTokenAuthorizer

        GetContainerById:
          Type: Api
          Properties:
            Path: /containers/{id}
            Method: GET
            Auth:
              Authorizer: LambdaTokenAuthorizer

  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/login.handler
      Runtime: nodejs24.x
      Environment:
        Variables:
          TABLE_NAME: !Ref AWSHomeDBTable
          AUTH_SECRET: !Sub "${AWS::StackName}-auth-secret"
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AWSHomeDBTable
      Events:
        LoginUser:
          Type: Api
          Properties:
            Path: /login
            Method: POST

  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/authorizer.handler
      Runtime: nodejs24.x
      Environment:
        Variables:
          AUTH_SECRET: !Sub "${AWS::StackName}-auth-secret"

  
  # Simple syntax to create a DynamoDB table with a single attribute primary key, more in
  # https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlesssimpletable


  # DynamoDB table to store item: {id: &lt;ID&gt;, name: &lt;NAME&gt;}
  AWSHomeDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-Data"

      BillingMode: PAY_PER_REQUEST

      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S

        - AttributeName: SK
          AttributeType: S

        - AttributeName: category
          AttributeType: S

        - AttributeName: purchasedFrom
          AttributeType: S

        - AttributeName: itemName
          AttributeType: S

        - AttributeName: warrantyExpiryDate
          AttributeType: S

        - AttributeName: entityType
          AttributeType: S

      KeySchema:
        - AttributeName: PK
          KeyType: HASH

        - AttributeName: SK
          KeyType: RANGE

      GlobalSecondaryIndexes:
        - IndexName: CategoryIndex
          KeySchema:
            - AttributeName: category
              KeyType: HASH
          Projection:
            ProjectionType: ALL

        - IndexName: PurchasedFromIndex
          KeySchema:
            - AttributeName: purchasedFrom
              KeyType: HASH
          Projection:
            ProjectionType: ALL

        - IndexName: ItemNameIndex
          KeySchema:
            - AttributeName: itemName
              KeyType: HASH
          Projection:
            ProjectionType: ALL

        - IndexName: WarrantyIndex
          KeySchema:
            - AttributeName: entityType
              KeyType: HASH
            - AttributeName: warrantyExpiryDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

      SSESpecification:
        SSEEnabled: true

      Tags:
        - Key: Application
          Value: AWSHomeDB

Outputs:
  WebEndpoint:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Stage/"
