<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Form</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f7fb;
      color: #233;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(135deg, #eef4ff, #f8fbff);
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.12);
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }

    p {
      margin: 0 0 18px;
      color: #52607a;
      font-size: 0.95rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    label {
      font-weight: 600;
      color: #334155;
      font-size: 0.95rem;
    }

    input[type="text"],
    input[type="tel"],
    input[type="number"],
    input[type="file"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 0.98rem;
      background: #fff;
    }

    input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    button {
      width: 100%;
      margin-top: 8px;
      border: none;
      border-radius: 10px;
      padding: 12px 14px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.18s ease;
    }

    button:hover { opacity: 0.95; }
    button:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Customer Details</h1>
    <p>Please fill in the information below.</p>

    <form>
      <div class="field">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" placeholder="Enter your name" required />
      </div>

      <div class="field">
        <label for="address">Address</label>
        <input id="address" name="address" type="text" placeholder="Enter your address" required />
      </div>

      <div class="field">
        <label for="phone">Phone</label>
        <input id="phone" name="phone" type="tel" placeholder="Enter phone number" required />
      </div>

      <div class="field">
        <label for="age">Age</label>
        <input id="age" name="age" type="number" min="1" max="120" placeholder="Enter age" required />
      </div>

      <div class="field">
        <label for="file">Upload File</label>
        <input id="file" name="file" type="file" />
      </div>

      <button type="submit">Save</button>
      <button type="submit">A test aaas again to force commit?</button>
    </form>
  </main>
</body>
</html>
