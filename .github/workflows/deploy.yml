name: Deploy AWS SAM

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - main

permissions:
  id-token: write
  contents: read

jobs:

  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - uses: aws-actions/setup-sam@v2

      - name: Install dependencies
        run: npm install

      - run: sam build
      - run: sam deploy --config-env staging --no-confirm-changeset --no-fail-on-empty-changeset --force-upload

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - uses: aws-actions/setup-sam@v2

      - name: Install dependencies
        run: npm install

      - run: sam build
      - run: sam deploy --config-env production --no-confirm-changeset --no-fail-on-empty-changeset --force-upload