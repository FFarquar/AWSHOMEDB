name: Deploy AWS SAM

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - main

permissions:
  id-token: write
  contents: read
  pages: write
  deployments: write

jobs:

  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - uses: aws-actions/setup-sam@v2

      - name: Install dependencies
        run: npm install

      - run: sam build
      - run: sam deploy --config-env staging --no-confirm-changeset --no-fail-on-empty-changeset --force-upload --parameter-overrides "StageName=${{ github.ref_name }}"

      # 🚀 1. Put the dynamic config directly into your frontend directory
      - name: Generate Frontend Configuration
        run: |
          API_URL=$(aws cloudformation describe-stacks --stack-name AWSHOMEDB-STAGING --query "Stacks.Outputs[?OutputKey=='WebEndpoint'].OutputValue" --output text)
          API_URL_CLEAN=${API_URL%/}
          echo "window.APP_CONFIG = { API_BASE_URL: '$API_URL_CLEAN' };" > frontend/config.js
          echo "✅ Generated config.js inside frontend folder"

      # 📦 2. Automatically copies EVERYTHING from the frontend folder into a staging subdirectory
      - name: Prepare Staging Subdirectory
        run: |
          mkdir -p staging
          cp -r frontend/* staging/
          echo "✅ Copied all frontend files and artifacts to staging folder"

      # 📤 Upload everything to GitHub Pages infrastructure
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Leaves staging inside /staging and production paths out of the root

      # 🌐 Publish Live to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - uses: aws-actions/setup-sam@v2

      - name: Install dependencies
        run: npm install

      - run: sam build
      - run: sam deploy --config-env production --no-confirm-changeset --no-fail-on-empty-changeset --force-upload --parameter-overrides "StageName=${{ github.ref_name }}"

      # 🚀 1. Put the dynamic config directly into your frontend directory
      - name: Generate Frontend Configuration
        run: |
          API_URL=$(aws cloudformation describe-stacks --stack-name AWSHOMEDB-PROD --query "Stacks.Outputs[?OutputKey=='WebEndpoint'].OutputValue" --output text)
          API_URL_CLEAN=${API_URL%/}
          echo "window.APP_CONFIG = { API_BASE_URL: '$API_URL_CLEAN' };" > frontend/config.js
          echo "✅ Generated config.js inside frontend folder"

      # 📤 2. For production, upload ONLY the contents of the frontend directory to keep the root clean
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend' 

      # 🌐 Publish Live to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
