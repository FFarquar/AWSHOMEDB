name: Deploy AWS SAM

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - main

permissions:
  id-token: write
  contents: read
  # 🔑 Required for GitHub Pages
  pages: write
  deployments: write

jobs:

  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - uses: aws-actions/setup-sam@v2

      - name: Install dependencies
        run: npm install

      - run: sam build
      
      # 🛠️ RESTORED: Your original working SAM deploy command
      - run: sam deploy --config-env staging --no-confirm-changeset --no-fail-on-empty-changeset --force-upload --parameter-overrides "StageName=${{ github.ref_name }}"

      # 🚀 Dynamic config generation
      - name: Generate Frontend Configuration
        run: |
          API_URL=$(aws cloudformation describe-stacks --stack-name AWSHOMEDB-STAGING --query "Stacks[0].Outputs[?OutputKey=='WebEndpoint'].OutputValue" --output text)
          API_URL_CLEAN=${API_URL%/}
          echo "window.APP_CONFIG = { API_BASE_URL: '$API_URL_CLEAN' };" > config.js
          echo "✅ Generated config.js with Staging URL: $API_URL_CLEAN"

      # 📦 Stage environment: Prepare a staging subdirectory so it doesn't overwrite production
      - name: Prepare Staging Subdirectory
        run: |
          mkdir -p staging
          cp index.html config.js staging/

      # 📤 Upload Staging code to GitHub Pages infrastructure
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      # 🌐 Publish Live to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - uses: aws-actions/setup-sam@v2

      - name: Install dependencies
        run: npm install

      - run: sam build
      
      # 🛠️ RESTORED: Your original working SAM deploy command
      - run: sam deploy --config-env production --no-confirm-changeset --no-fail-on-empty-changeset --force-upload --parameter-overrides "StageName=${{ github.ref_name }}"

      # 🚀 Dynamic config generation
      - name: Generate Frontend Configuration
        run: |
          API_URL=$(aws cloudformation describe-stacks --stack-name AWSHOMEDB-PROD --query "Stacks[0].Outputs[?OutputKey=='WebEndpoint'].OutputValue" --output text)
          API_URL_CLEAN=${API_URL%/}
          echo "window.APP_CONFIG = { API_BASE_URL: '$API_URL_CLEAN' };" > config.js
          echo "✅ Generated config.js with Production URL: $API_URL_CLEAN"

      # 📤 Upload Production code to GitHub Pages infrastructure
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      # 🌐 Publish Live to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
