name: Deploy AWS SAM

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - main

permissions:
  id-token: write
  contents: read
  pages: write
  deployments: write

jobs:

  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - uses: aws-actions/setup-sam@v2

      - name: Install dependencies
        run: npm install

      - run: sam build
      
      - run: sam deploy --config-env staging --no-confirm-changeset --no-fail-on-empty-changeset --force-upload --parameter-overrides "StageName=${{ github.ref_name }}"

      # 🚀 Self-Discovering Staging URL Extraction & Configuration Builder
      - name: Generate Frontend Configuration
        run: |
          echo "🔎 Scanning CloudFormation to find the matching Staging endpoint..."
          
          # Searches active stacks for a 'WebEndpoint' key matching 'STAGING' or 'staging'
          API_URL=$(aws cloudformation describe-stacks \
            --region ap-southeast-2 \
            --query "Stacks[?contains(StackName, 'STAGING') || contains(StackName, 'staging')].Outputs[?OutputKey=='WebEndpoint'].OutputValue" \
            --output text)
          
          # Circuit Breaker: Crash the pipeline cleanly if the URL cannot be resolved
          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            echo "❌ CRITICAL ERROR: Could not locate a CloudFormation stack containing 'STAGING' with an output named 'WebEndpoint'."
            echo "💡 Troubleshooting Step: Check your AWS Console to verify your stack outputs are deployed completely."
            exit 1
          fi
          
          # Clean whitespace and trailing slashes completely out of the text string
          API_URL_CLEAN=$(echo "$API_URL" | awk '{print $1}' | sed 's/\/$//')
          
          echo "window.APP_CONFIG = { API_BASE_URL: '$API_URL_CLEAN' };" > frontend/config.js
          echo "✅ Successfully written configuration payload to frontend/config.js: $API_URL_CLEAN"

      # 📦 Stage environment setup
      - name: Prepare Staging Subdirectory
        run: |
          mkdir -p staging
          cp -r frontend/* staging/
          echo "✅ Copied all frontend folder files and artifacts to staging/"

      # 📤 Upload Staging code to GitHub Pages infrastructure
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      # 🌐 Publish Live to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - uses: aws-actions/setup-sam@v2

      - name: Install dependencies
        run: npm install

      - run: sam build
      
      - run: sam deploy --config-env production --no-confirm-changeset --no-fail-on-empty-changeset --force-upload --parameter-overrides "StageName=${{ github.ref_name }}"

      # 🚀 Self-Discovering Production URL Extraction & Configuration Builder
      - name: Generate Frontend Configuration
        run: |
          echo "🔎 Scanning CloudFormation to find the matching Production endpoint..."
          
          # Searches active stacks for a 'WebEndpoint' key matching 'PROD' or 'prod'
          API_URL=$(aws cloudformation describe-stacks \
            --region ap-southeast-2 \
            --query "Stacks[?contains(StackName, 'PROD') || contains(StackName, 'prod')].Outputs[?OutputKey=='WebEndpoint'].OutputValue" \
            --output text)
          
          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            echo "❌ CRITICAL ERROR: Could not locate a CloudFormation stack containing 'PROD' with an output named 'WebEndpoint'."
            exit 1
          fi
          
          # Clean whitespace and trailing slashes completely out of the text string
          API_URL_CLEAN=$(echo "$API_URL" | awk '{print $1}' | sed 's/\/$//')
          
          echo "window.APP_CONFIG = { API_BASE_URL: '$API_URL_CLEAN' };" > frontend/config.js
          echo "✅ Successfully written configuration payload to frontend/config.js: $API_URL_CLEAN"

      # 📤 Upload Production code to GitHub Pages infrastructure (Isolated root build directory)
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend' 

      # 🌐 Publish Live to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
