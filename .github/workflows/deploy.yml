name: Deploy AWS SAM

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - main

permissions:
  id-token: write
  contents: read
  pages: write
  deployments: write

# 🚨 PREVENT PARALLEL DEPLOYS (CRITICAL FIX)
concurrency:
  group: aws-sam-deploy-${{ github.ref_name }}
  cancel-in-progress: true


jobs:

  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      # 🚀 INSERT VALIDATION STEP HERE:
      - name: Verify Live Data Connection
        run: |
          echo "🔍 Scanning backend configurations for local mock data flags..."
          # Update "config.js" to your true backend path if nested (e.g., src/config.js)
          if grep -q "USE_MOCK:[[:space:]]*true" config.js; then
            echo "❌ CRITICAL: 'USE_MOCK: true' is active in config.js!"
            echo "Please disable local mocks before committing to remote branches."
            exit 1
          fi
          echo "✅ Validation passed. Mock data is disabled."

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - uses: aws-actions/setup-sam@v2

      - name: Install dependencies
        run: npm install

      - name: Build
        run: sam build

      # 🚀 FIXED DEPLOY (NO config-env, NO ambiguity)
      - name: Deploy to AWS (Staging)
        run: |
          sam deploy \
            --stack-name AWSHOMEDB-STAGING \
            --region ap-southeast-2 \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --force-upload \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides "StageName=${{ github.ref_name }}"

      # 🚀 Generate Frontend Configuration
      - name: Generate Frontend Configuration
        run: |
          echo "🔎 Using fixed stack name: AWSHOMEDB-STAGING"

          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "AWSHOMEDB-STAGING" \
            --region ap-southeast-2 \
            --query "Stacks[0].Outputs[?OutputKey=='WebEndpoint'].OutputValue" \
            --output text)

          API_URL_CLEAN=$(echo "$API_URL" | awk '{print $1}' | sed 's/\/$//')

          echo "window.APP_CONFIG = { API_BASE_URL: '$API_URL_CLEAN' };" > frontend/config.js
          echo "✅ API URL: $API_URL_CLEAN"

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4


  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    concurrency:
      group: aws-sam-prod
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      # 🚀 INSERT VALIDATION STEP HERE:
      - name: Verify Live Data Connection
        run: |
          echo "🔍 Scanning backend configurations for local mock data flags..."
          # Update "config.js" to your true backend path if nested (e.g., src/config.js)
          if grep -q "USE_MOCK:[[:space:]]*true" config.js; then
            echo "❌ CRITICAL: 'USE_MOCK: true' is active in config.js!"
            echo "Please disable local mocks before committing to remote branches."
            exit 1
          fi
          echo "✅ Validation passed. Mock data is disabled."
          
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - uses: aws-actions/setup-sam@v2

      - name: Install dependencies
        run: npm install

      - name: Build
        run: sam build

      - name: Deploy to AWS (Production)
        run: |
          sam deploy \
            --stack-name AWSHOMEDB-PROD \
            --region ap-southeast-2 \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --force-upload \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides "StageName=${{ github.ref_name }}"

      - name: Generate Frontend Configuration
        run: |
          echo "🔎 Using fixed stack name: AWSHOMEDB-PROD"

          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "AWSHOMEDB-PROD" \
            --region ap-southeast-2 \
            --query "Stacks[0].Outputs[?OutputKey=='WebEndpoint'].OutputValue" \
            --output text)

          API_URL_CLEAN=$(echo "$API_URL" | awk '{print $1}' | sed 's/\/$//')

          echo "window.APP_CONFIG = { API_BASE_URL: '$API_URL_CLEAN' };" > frontend/config.js
          echo "✅ API URL: $API_URL_CLEAN"

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4