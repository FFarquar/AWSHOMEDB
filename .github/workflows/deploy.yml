name: Deploy AWS SAM

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - main

permissions:
  id-token: write
  contents: read
  pages: write
  deployments: write

jobs:

  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - uses: aws-actions/setup-sam@v2

      - name: Install dependencies
        run: npm install

      - run: sam build
      
      - run: sam deploy --config-env staging --no-confirm-changeset --no-fail-on-empty-changeset --force-upload --parameter-overrides "StageName=${{ github.ref_name }}"

      # 🚀 FIX 1: Robust URL extraction using a refined query filter & safety block
      - name: Generate Frontend Configuration
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name AWSHOMEDB-STAGING \
            --region ap-southeast-2 \
            --query "Stacks[?StackName=='AWSHOMEDB-STAGING'].Outputs[?OutputKey=='WebEndpoint'].OutputValue" \
            --output text)
          
          # Safety check: Force pipeline crash if AWS outputs "None" or blank
          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            echo "❌ CRITICAL ERROR: Failed to extract WebEndpoint from AWS CloudFormation stack AWSHOMEDB-STAGING!"
            echo "Please check if your template.yaml has Outputs -> WebEndpoint properly deployed."
            exit 1
          fi
          
          API_URL_CLEAN=${API_URL%/}
          echo "window.APP_CONFIG = { API_BASE_URL: '$API_URL_CLEAN' };" > frontend/config.js
          echo "✅ Generated config.js with Staging URL: $API_URL_CLEAN"

      # 📦 Stage environment setup
      - name: Prepare Staging Subdirectory
        run: |
          mkdir -p staging
          cp -r frontend/* staging/
          echo "✅ Copied all frontend folder files to staging/"

      # 📤 Upload Staging code
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      # 🌐 Publish Live
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - uses: aws-actions/setup-sam@v2

      - name: Install dependencies
        run: npm install

      - run: sam build
      
      - run: sam deploy --config-env production --no-confirm-changeset --no-fail-on-empty-changeset --force-upload --parameter-overrides "StageName=${{ github.ref_name }}"

      # 🚀 FIX 2: Production URL extraction using a refined query filter & safety block
      - name: Generate Frontend Configuration
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name AWSHOMEDB-PROD \
            --region ap-southeast-2 \
            --query "Stacks[?StackName=='AWSHOMEDB-PROD'].Outputs[?OutputKey=='WebEndpoint'].OutputValue" \
            --output text)
          
          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            echo "❌ CRITICAL ERROR: Failed to extract WebEndpoint from AWS CloudFormation stack AWSHOMEDB-PROD!"
            exit 1
          fi
          
          API_URL_CLEAN=${API_URL%/}
          echo "window.APP_CONFIG = { API_BASE_URL: '$API_URL_CLEAN' };" > frontend/config.js
          echo "✅ Generated config.js with Production URL: $API_URL_CLEAN"

      # 📤 Upload Production code
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend' 

      # 🌐 Publish Live
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
