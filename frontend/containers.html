<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AWS Home DB - Containers</title>

<script src="./config.js"></script>
<script src="./apiClient.js"></script>

<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
        margin: 0;
        background: #f4f6f9;
    }

    header {
        background: #232f3e;
        color: white;
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
    }

    .container {
        padding: 16px;
    }

    .toolbar {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
        flex-wrap: wrap;
    }

    button {
        cursor: pointer;
        border: none;
        padding: 10px 12px;
        border-radius: 6px;
        font-weight: 600;
        font-size: 14px;
        min-height: 40px;
    }

    .btn-primary { background: #ff9900; color: white; }
    .btn-secondary { background: #555; color: white; }

    /* TABLE WRAPPER → FIXES MOBILE OVERFLOW */
    .table-wrapper {
        width: 100%;
        overflow-x: auto;
        background: white;
        border-radius: 8px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        min-width: 700px; /* forces scroll instead of squish */
    }

    th, td {
        padding: 10px;
        border-bottom: 1px solid #eee;
        text-align: left;
        font-size: 14px;
        white-space: nowrap;
    }

    th {
        background: #f0f0f0;
    }

    tr:hover {
        background: #fafafa;
    }

    .link {
        color: #0073bb;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
    }

    /* MODAL */
    .modal {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.4);
        justify-content: center;
        align-items: center;
        padding: 10px;
    }

    .modal-content {
        background: white;
        padding: 18px;
        width: 100%;
        max-width: 420px;
        border-radius: 10px;
        box-sizing: border-box;
    }

    .form-group {
        margin-bottom: 10px;
    }

    label {
        font-size: 12px;
        font-weight: 600;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 4px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
    }

    .small {
        font-size: 12px;
        color: #666;
        margin-top: 6px;
        word-break: break-word;
    }

    .actions {
        display: flex;
        gap: 10px;
        margin-top: 12px;
    }

    /* MOBILE TWEAKS */
    @media (max-width: 600px) {
        th, td {
            font-size: 13px;
        }

        button {
            width: 100%;
        }

        .toolbar {
            flex-direction: column;
        }
    }
</style>
</head>

<body>

<header>
    <div>AWS Home DB - Containers</div>
    <button class="btn-secondary" onclick="logout()">Logout</button>
</header>

<div class="container">

    <div class="toolbar">
        <!-- 🛠️ UPDATE THIS LINE TO ADD THE ID: -->
        <button class="btn-primary" id="btnNewContainer" onclick="openCreate()">New Container</button>
        <button class="btn-secondary" onclick="loadContainers()">Refresh</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Purchase Date</th>
                    <th>Price</th>
                    <th>Warranty</th>
                    <!-- 🛠️ UPDATE THIS LINE TO ADD THE ID: -->
                    <th id="thActions">Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">

        <h3 id="modalTitle">Container</h3>

        <div class="form-group">
            <label>Name</label>
            <input id="name" />
        </div>

        <div class="form-group">
            <label>Photo Location</label>
            <input id="photoLocation" />
        </div>

        <div class="form-group">
            <label>Purchase Date</label>
            <input id="purchaseDate" type="date"/>
        </div>

        <div class="form-group">
            <label>Warranty Finish Date</label>
            <input id="warrantyFinishDate" type="date"/>
        </div>

        <div class="form-group">
            <label>Extended Warranty Finish Date</label>
            <input id="extendedWarrantyFinishDate" type="date"/>
        </div>

        <div class="form-group">
            <label>Purchase Price</label>
            <input id="purchasePrice" type="number"/>
        </div>

        <div class="small" id="editHint"></div>

        <div class="actions">
            <button class="btn-primary" onclick="save()">Save</button>
            <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        </div>

    </div>
</div>

<script>
    // 🛠️ DELETE YOUR OLD SCRIPT TAG CONTENTS AND PASTE THIS INSTEAD:
    const API = window.APP_CONFIG.API_BASE_URL;

    let token = localStorage.getItem("authToken");

    if (!window.APP_CONFIG?.USE_MOCK) {
        if (!token) {
            window.location.href = "login.html";
        }
    } else {
        token = "local-mock-token-xyz";
    }

    let containers = [];
    let editingId = null;

    const userRole = localStorage.getItem("userRole") || "USER";
    const isAdmin = userRole === "ADMIN";

    document.addEventListener("DOMContentLoaded", () => {
        if (!isAdmin) {
            const btnNew = document.getElementById("btnNewContainer");
            if (btnNew) btnNew.style.display = "none";
            
            const thActions = document.getElementById("thActions");
            if (thActions) thActions.style.display = "none";
        }
        loadContainers();
    });

    function authHeaders() {
        return {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
        };
    }

    async function loadContainers() {
        try {
            containers = await apiGet("/containers", "mock-containers.json");

            if (!Array.isArray(containers)) {
                console.warn("Invalid containers payload:", containers);
                containers = [];
            }

            renderTable();
        } catch (err) {
            console.error(err);
            containers = [];
            renderTable();
        }
    }

    function renderTable() {
        const body = document.getElementById("tableBody");
        body.innerHTML = "";

        if (!Array.isArray(containers)) {
            console.warn("renderTable expected array but got:", containers);
            return;
        }

        containers.forEach(c => {
            const pk = c.PK;

            const actionsCell = isAdmin 
                ? `<td>
                    <button onclick="edit('${pk}')">Edit</button>
                    <button onclick="removeItem('${pk}')">Delete</button>
                </td>`
                : "";

            body.innerHTML += `
            <tr>
                <td>
                    <span class="link" onclick="openItems('${pk}')">
                        ${c.name}
                    </span>
                </td>
                <td>${c.purchaseDate || ""}</td>
                <td>$${c.purchasePrice || 0}</td>
                <td>${c.warrantyFinishDate || ""}</td>
                ${actionsCell}
            </tr>`;
        });
    }

    function openItems(pk) {
        const id = pk.replace("CONTAINER#", "");
        window.location.href = `items.html?containerId=${id}`;
    }

    function openCreate() {
        if (!isAdmin) return; 
        editingId = null;
        document.getElementById("modalTitle").innerText = "Create Container";
        clearForm();
        document.getElementById("modal").style.display = "flex";
    }

    function edit(pk) {
        if (!isAdmin) return;
        const item = containers.find(x => x.PK === pk);
        editingId = pk;

        document.getElementById("modalTitle").innerText = "Edit Container";

        document.getElementById("name").value = item.name || "";
        document.getElementById("photoLocation").value = item.photoLocation || "";
        document.getElementById("purchaseDate").value = item.purchaseDate || "";
        document.getElementById("warrantyFinishDate").value = item.warrantyFinishDate || "";
        document.getElementById("extendedWarrantyFinishDate").value = item.extendedWarrantyFinishDate || "";
        document.getElementById("purchasePrice").value = item.purchasePrice || 0;

        document.getElementById("editHint").innerText = pk;
        document.getElementById("modal").style.display = "flex";
    }

    async function save() {
        if (!isAdmin) return alert("Unauthorized action.");

        const name = document.getElementById("name").value.trim();
        const photoLocation = document.getElementById("photoLocation").value.trim();
        const purchaseDate = document.getElementById("purchaseDate").value;
        const warrantyFinishDate = document.getElementById("warrantyFinishDate").value;
        const extendedWarrantyFinishDate = document.getElementById("extendedWarrantyFinishDate").value;
        const purchasePrice = Number(document.getElementById("purchasePrice").value) || 0;

        if (!name) return alert("Name required");

        const id = "CONTAINER" + Date.now();
        const pk = editingId || `CONTAINER#${id}`;

        const containerPayload = {
            PK: pk,
            SK: "METADATA",
            containerId: editingId ? editingId.replace("CONTAINER#", "") : id,
            name,
            photoLocation,
            purchaseDate,
            warrantyFinishDate,
            extendedWarrantyFinishDate,
            purchasePrice
        };

        if (window.APP_CONFIG?.USE_MOCK) {
            console.log("⚠️ MOCK MODE SAVE INTERCEPTED");
            if (editingId) {
                const index = containers.findIndex(c => c.PK === editingId);
                if (index !== -1) containers[index] = containerPayload;
            } else {
                containers.push(containerPayload);
            }
            renderTable();
            closeModal();
            return; 
        }

        try {
            if (editingId) {
                const cleanId = editingId.replace("CONTAINER#", "");
                const original = containers.find(c => c.PK === editingId);
                const update = {};

                if (name !== original.name) update.name = name;
                if (photoLocation !== original.photoLocation) update.photoLocation = photoLocation;
                if (purchaseDate !== original.purchaseDate) update.purchaseDate = purchaseDate;
                if (warrantyFinishDate !== original.warrantyFinishDate) update.warrantyFinishDate = warrantyFinishDate;
                if (extendedWarrantyFinishDate !== original.extendedWarrantyFinishDate) update.extendedWarrantyFinishDate = extendedWarrantyFinishDate;
                if (purchasePrice !== original.purchasePrice) update.purchasePrice = purchasePrice;

                await fetch(`${API}/containers/${cleanId}`, {
                    method: "PUT",
                    headers: authHeaders(),
                    body: JSON.stringify(update)
                });
            } else {
                await fetch(`${API}/containers`, {
                    method: "POST",
                    headers: authHeaders(),
                    body: JSON.stringify(containerPayload)
                });
            }
            closeModal();
            await loadContainers();
        } catch (err) {
            console.error("AWS Communication Failure:", err);
            alert(`Failed to execute network transaction: ${err.message}`);
        }
    }

    // function removeItem(pk) {
    //     if (!isAdmin) return;
    //     if (confirm("Are you sure you want to delete this container?")) {
    //         if (window.APP_CONFIG?.USE_MOCK) {
    //             containers = containers.filter(c => c.PK !== pk);
    //             renderTable();
    //             return;
    //         }
    //         console.log("Delete cloud path requested for:", pk);
    //     }
    // }

    async function removeItem(pk) {
    if (!isAdmin) return;
    
    if (confirm("Are you sure you want to delete this container?")) {
        // Local mock mode logic
        if (window.APP_CONFIG?.USE_MOCK) {
            containers = containers.filter(c => c.PK !== pk);
            renderTable();
            return;
        }
        
        // Cloud backend logic aligned with your API pattern
        try {
            // Sends the DELETE request to your backend endpoint (e.g., API/containers/123)
            const response = await fetch(`${API}/containers/${pk}`, {
                method: "DELETE",
                headers: authHeaders()
            });

            if (!response.ok) {
                throw new Error(`Server responded with status: ${response.status}`);
            }

            // Successfully deleted on server -> update local state and UI
            containers = containers.filter(c => c.PK !== pk);
            renderTable();

        } catch (error) {
            console.error("Cloud delete failed:", error);
            alert("Failed to delete the container from the cloud. Please try again.");
        }
    }
}

    function clearForm() {
        ["name","photoLocation","purchaseDate","warrantyFinishDate","extendedWarrantyFinishDate","purchasePrice"]
        .forEach(id => document.getElementById(id).value = "");
        document.getElementById("editHint").innerText = "";
    }

    function closeModal() {
        document.getElementById("modal").style.display = "none";
        editingId = null;
        clearForm();
    }

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }

</script>

</body>
</html>
